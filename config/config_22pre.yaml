# https://gitlab.cern.ch/cms-nanoAOD/nanoaod-doc/-/wikis/Releases/NanoAODv14
# https://twiki.cern.ch/twiki/bin/view/CMS/PdmVRun3Analysis

# cmssw setup
cmssw_version: CMSSW_14_0_6_patch1
scram_arch: slc7_amd64_gcc12
cmssw_env_name: nanogen
sandbox_script: cmssw_nanogen.sh

# arguments for cmsDriver.py that creates the cmsRun config
global_tag:
  # TODO: missing mc GT
  mc: NOT_EXISTING_YET
  # TODO: the data GT is for prompt reco and probably too old
  # given that nano v14 2022 datasets are from a 22Sep2023 reprocessing
  data: 140X_dataRun3_Prompt_v2
era:
  mc: &era Run3
  data: *era

# postfix for produced nano datasets in the cms-store-like path
campaign_version_postfix: NanoAODv14UHH

# references to dataset and nano configs
dataset_config: datasets_22pre.yaml
nano_config: nano_run3.yaml
