# Custom NanoAOD v14, Run3, 2022, postEE

# cmssw setup
# from https://twiki.cern.ch/twiki/bin/viewauth/CMS/PdmVRun3Analysis#Recipes_for_Run3Summer23_and_Run
# CMSSW version should be at least CMSSW_14_0_6_patch1 (but 140X)
cmssw_version: CMSSW_14_0_19_patch1
scram_arch: el9_amd64_gcc12
cmssw_env_name: nanogen
sandbox_script: cmssw_nanogen.sh

# arguments for cmsDriver.py that creates the cmsRun config
global_tag:
  # https://cms-conddb.cern.ch/cmsDbBrowser/list/Prod/gts/140X_mcRun3_2022_realistic_postEE_v3
  mc: 140X_mcRun3_2022_realistic_postEE_v3
  # https://cms-conddb.cern.ch/cmsDbBrowser/list/Prod/gts/140X_dataRun3_v20
  data: 140X_dataRun3_v20
era:
  mc: &era Run3
  data: *era

# lumi mask for data
# https://twiki.cern.ch/twiki/bin/view/CMS/PdmVRun3Analysis?rev=161#Year_2022
lumi_mask: https://cms-service-dqmdc.web.cern.ch/CAF/certification/Collisions22/Cert_Collisions2022_355100_362760_Golden.json

# postfix for produced nano datasets in the cms-store-like path
campaign_postfix: NanoAODv14UHH

# references to dataset and nano configs
dataset_config: datasets_22post.yaml
nano_config: nano_run3_v14.yaml
