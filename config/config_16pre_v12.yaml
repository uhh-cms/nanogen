# Custom NanoAOD v12, Run2, 2016, preVFP.
#
# "pre" refers to the era in 2016 before the VPF fix, which is commonly denoted HIPM in DAS
# (hip mitigation through software adjustments).
#
# Links:
#   - https://gitlab.cern.ch/cms-nanoAOD/nanoaod-doc/-/wikis/Releases/NanoAODv12
#   - https://twiki.cern.ch/twiki/bin/view/CMS/PdmVRun2Analysis

# cmssw setup
cmssw_version: CMSSW_13_0_19
scram_arch: el9_amd64_gcc11
cmssw_env_name: nanogen
sandbox_script: cmssw_nanogen.sh

# arguments for cmsDriver.py that creates the cmsRun config
global_tag:
  mc: auto:run2_mc_pre_vfp
  data: auto:run2_data
era:
  mc: &era Run2_2016_HIPM,run2_nanoAOD_106Xv2
  data: *era

# lumi mask for data
lumi_mask: /afs/cern.ch/cms/CAF/CMSCOMM/COMM_DQM/certification/Collisions16/13TeV/Legacy_2016/Cert_271036-284044_13TeV_Legacy2016_Collisions16_JSON.txt

# postfix for produced nano datasets in the cms-store-like path
campaign_postfix: NanoAODv12UHH

# references to dataset and nano configs
dataset_config: datasets_16pre.yaml
nano_config: nano_run2_v12.yaml
