[modules]
# modules for indexing
nanogen.tasks


[analysis]
# nanogen specific setttings
default_config: config_24_v15
default_dataset: hh_ggf_hbb_htt_kl1_kt1_powheg

htcondor_flavor: $NG_HTCONDOR_FLAVOR
slurm_flavor: $NG_SLURM_FLAVOR
slurm_partition: $NG_SLURM_PARTITION

# output locations per task family, "local", "dcache" or (an other) "wlcg"
# DO NOT CHANGE ANYTHING HERE
BundleRepo: local
GetDatasetLFNs: local
FetchLumiMask: local
CreateCMSRunConfig: local
CreateDBEntry: local
CollectNanoSizes: local, local_fs_shared
ValidateNano: local, local_fs_shared
bbtt.ReduceNano: local

# TO CHANGE THE LOCATION OF THE NANO OUTPUT FILES, CHANGE THE WLCG AND LOCAL FS ENTRIES BELOW
# (note that, on remote envs such as htcondor, mirrored dcache targets fallback to plain wlcg ones)
CreateNano: dcache, local_fs_dcache_store, wlcg_fs
MergeNano: dcache, local_fs_dcache_store, wlcg_fs
FetchLFN: dcache, local_fs_dcache_store_mrieger, wlcg_fs_mrieger
# 16pre(VFP)
CreateNano_config_16pre_v12: dcache, local_fs_dcache_store_mrieger, wlcg_fs_mrieger
MergeNano_config_16pre_v12: &::CreateNano_config_16pre_v12
# 16post(VFP)
CreateNano_config_16post_v12: dcache, local_fs_dcache_store_mrieger, wlcg_fs_mrieger
MergeNano_config_16post_v12: &::CreateNano_config_16post_v12
# 17
CreateNano_config_17_v12: dcache, local_fs_dcache_store_aalvesan, wlcg_fs_aalvesan
MergeNano_config_17_v12: &::CreateNano_config_17_v12
# 18
CreateNano_config_18_v12: dcache, local_fs_dcache_store_roward, wlcg_fs_roward
MergeNano_config_18_v12: &::CreateNano_config_18_v12
# 22pre(EE)
CreateNano_config_22pre_v12: dcache, local_fs_dcache_store_nprouvos, wlcg_fs_nprouvos
MergeNano_config_22pre_v12: &::CreateNano_config_22pre_v12
CreateNano_config_22pre_v14: &::CreateNano_config_22pre_v12
MergeNano_config_22pre_v14: &::CreateNano_config_22pre_v12
# 22post(EE)
CreateNano_config_22post_v12: dcache, local_fs_dcache_store_aalvesan, wlcg_fs_aalvesan
MergeNano_config_22post_v12: &::CreateNano_config_22post_v12
CreateNano_config_22post_v14: &::CreateNano_config_22post_v12
MergeNano_config_22post_v14: &::CreateNano_config_22post_v12
# 23pre(BPIX)
CreateNano_config_23pre_v14: dcache, local_fs_dcache_store_bwieders, wlcg_fs_bwieders
MergeNano_config_23pre_v14: &::CreateNano_config_23pre_v14
# 23post(BPIX)
CreateNano_config_23post_v14: dcache, local_fs_dcache_store_roward, wlcg_fs_roward
MergeNano_config_23post_v14: &::CreateNano_config_23post_v14
# 24
CreateNano_config_24_v15: dcache, local_fs_dcache_store_mrieger, wlcg_fs_mrieger
MergeNano_config_24_v15: &::CreateNano_config_24_v15


[job]
# law job settings
job_file_dir: $NG_JOB_BASE
job_file_dir_cleanup: False
job_file_dir_mkdtemp: sub_{{task_id}}_XXX


[logging]
# logging settings
law: INFO
luigi-interface: INFO
gfal2: WARNING


[notifications]

mattermost_hook_url: $NG_MATTERMOST_HOOK_URL
mattermost_user: nanogen


[local_fs]
# default local file system relative to the system root
base: /


[local_fs_shared]
# shared, local fs
# base: /data/dust/user/riegerma/nanogen/store
base: /data/dust/user/wiedersb/nanogen/store
default_file_perm: 0o0666
default_dir_perm: 0o0777


[local_fs_store]
# local fs for task outputs
base: $NG_STORE_LOCAL


[local_fs_dcache_store]
# local, read-only desy dcache mount for accessing intermediate task outputs
# for the current user
base: /pnfs/desy.de/cms/tier2/store/user/$NG_CERN_USER_DCACHE_STORE/nanogen_store
local_root_depth: 3


[wlcg_fs]
# remote fs for intermediate outputs
# for the current user
base_xrootd: root://dcache-cms-xrootd.desy.de:1094/pnfs/desy.de/cms/tier2/store/user/$NG_CERN_USER_DCACHE_STORE/nanogen_store
base_gsiftp: gsiftp://dcache-cms-gridftp.desy.de/pnfs/desy.de/cms/tier2/store/user/$NG_CERN_USER_DCACHE_STORE/nanogen_store
base_webdav: davs://dcache-cms-webdav-wan.desy.de:2880/pnfs/desy.de/cms/tier2/store/user/$NG_CERN_USER_DCACHE_STORE/nanogen_store
base: &::base_webdav
base_mkdir: &::base_webdav
create_file_dir: True
use_cache: $NG_WLCG_USE_CACHE
cache_root: $NG_WLCG_CACHE_ROOT
cache_cleanup: $NG_WLCG_CACHE_CLEANUP
cache_max_size: 50GB


# storage location for marcel's dcache directory
[local_fs_dcache_store_mrieger]
base: /pnfs/desy.de/cms/tier2/store/user/mrieger/nanogen_store
local_root_depth: 3
[wlcg_fs_mrieger]
