[luigi_core]
# luigi core settings
local_scheduler: $NG_LOCAL_SCHEDULER
scheduler_host: $NG_SCHEDULER_HOST
scheduler_port: $NG_SCHEDULER_PORT
parallel_scheduling: False
no_lock: True
log_level: INFO


[luigi_scheduler]
# luigi scheduler settings
record_task_history: False
remove_delay: 86400
retry_delay: 30
worker_disconnect_delay: 30


[luigi_worker]
# luigi worker settings
ping_interval: 20
wait_interval: 20
check_unfulfilled_deps: False
cache_task_completion: True
keep_alive: $NG_WORKER_KEEP_ALIVE
force_multiprocessing: False


[luigi_resources]
# resources visible in central scheduler
naf_riegerma: 5000
naf_alvesand: 5000
naf_wiedersb: 5000
naf_prouvost: 5000
naf_haddadan: 5000
naf_nguyenth: 5000
naf_wardrobe: 5000
naf_pgadow: 5000
